<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Private AI Agent - Layout Preview</title>
  <style>
    :root {
      --bg: #0b0b0c;
      --panel: #0f0f10;
      --sidebar: #121214;
      --card: #17171a;
      --card-2: #1d1d22;
      --line: #2a2a32;
      --text: #ececf1;
      --muted: #a5a6b3;
      --blue: #60a5fa;
      --blue-soft: rgba(96, 165, 250, 0.16);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(1400px, 100%);
      height: min(860px, calc(100vh - 48px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      display: grid;
      grid-template-columns: var(--side-w, 196px) 1fr;
      transition: grid-template-columns 180ms ease;
    }
    .app.collapsed { --side-w: 76px; }

    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }
    .side-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .side-toggle {
      border: 1px solid var(--line);
      background: #17171a;
      color: var(--muted);
      border-radius: 8px;
      font-size: 12px;
      height: 30px;
      padding: 0 8px;
      cursor: pointer;
    }
    .sphere {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, #4f46e5, #2563eb, #06b6d4, #4f46e5);
      box-shadow: 0 0 0 3px #0f0f10;
      margin: 4px 0 0;
      flex: 0 0 auto;
    }
    .nav {
      width: 100%;
      display: grid;
      gap: 8px;
    }
    .nav button {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 12px;
      cursor: default;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
    }
    .app.collapsed .nav button { text-align: center; padding: 9px 4px; }
    .nav button.active {
      background: var(--blue-soft);
      border-color: rgba(96, 165, 250, 0.3);
      color: #dbeafe;
    }

    .main {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-width: 0;
    }
    .status {
      margin: 10px 10px 8px;
      background: #121216;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      color: #d4d4dd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .phone-link {
      border: 1px solid rgba(96, 165, 250, 0.38);
      background: rgba(96, 165, 250, 0.12);
      color: #dbeafe;
      border-radius: 8px;
      font-size: 12px;
      padding: 6px 10px;
      white-space: nowrap;
    }
    .appbar {
      padding: 0 12px 8px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .content {
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 10px;
      min-height: 0;
    }
    .chat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 0;
    }
    .chat-log {
      padding: 12px;
      overflow: auto;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .bubble {
      max-width: 72%;
      padding: 9px 11px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.45;
    }
    .bubble.ai {
      background: #20202a;
      border: 1px solid #31313e;
    }
    .bubble.user {
      background: #1a273a;
      border: 1px solid #2c4465;
      margin-left: auto;
    }
    .side {
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }
    .fold-head {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0;
      cursor: pointer;
    }
    .fold-title {
      margin: 0;
      font-size: 13px;
      color: #f3f4f6;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .count {
      min-width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid rgba(96, 165, 250, 0.4);
      background: rgba(96, 165, 250, 0.14);
      color: #dbeafe;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      line-height: 1;
    }
    .chev {
      color: var(--muted);
      font-size: 12px;
    }
    .fold-body {
      margin-top: 6px;
    }
    .card.collapsed .fold-body {
      display: none;
    }
    .card.collapsed .chev {
      transform: rotate(-90deg);
      display: inline-block;
    }
    .card h3 {
      margin: 0 0 6px;
      font-size: 13px;
      color: #f3f4f6;
    }
    .card p {
      margin: 4px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .input {
      border-top: 1px solid var(--line);
      padding: 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      background: #151519;
    }
    .icon, .send {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card-2);
      color: #d8d9e4;
      height: 34px;
      padding: 0 12px;
      font-size: 12px;
    }
    .field {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #131317;
      color: #cacbda;
      height: 34px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
    }

    @media (max-width: 1024px) {
      .app { --side-w: 84px; }
      .app.collapsed { --side-w: 72px; }
      .content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app" id="appShell">
    <aside class="sidebar">
      <div class="side-top">
        <div class="sphere" aria-hidden="true"></div>
        <button class="side-toggle" id="sideToggle" type="button" title="收起侧边栏">◀</button>
      </div>
      <nav class="nav">
        <button class="active">伙伴</button>
        <button>今日</button>
        <button>连接</button>
        <button>能力</button>
      </nav>
    </aside>

    <main class="main">
      <section class="status">
        <span>伙伴在线 · 下次提醒 16:30</span>
        <button class="phone-link">连接手机</button>
      </section>
      <section class="appbar">今晚安排优化</section>

      <section class="content">
        <div class="chat">
          <div class="chat-log">
            <div class="bubble ai">你今天有 3 个重点事项，我已经帮你按优先级排好。要不要直接给你 2 小时高效版安排？</div>
            <div class="bubble user">可以，把今晚安排压缩成 2 小时，最好留出 30 分钟缓冲。</div>
            <div class="bubble ai">好的，我给你做了 A/B 两套：A 更稳，B 更激进。你确认后我可以直接同步到日程并发给 Agent Link 里的协作人。</div>
          </div>
          <section class="input">
            <button class="icon">+ / 🎤</button>
            <div class="field">告诉我你现在想推进什么…</div>
            <button class="send">发送</button>
          </section>
        </div>

        <aside class="side">
          <div class="card" id="focusCard">
            <button class="fold-head" type="button" data-target="focusCard">
              <h3 class="fold-title">今日聚焦</h3>
              <span class="chev">▾</span>
            </button>
            <div class="fold-body">
              <p>14:00 产品评审</p>
              <p>18:30 健身提醒</p>
              <p>本周目标进度 62%</p>
            </div>
          </div>
          <div class="card collapsed" id="confirmCard">
            <button class="fold-head" type="button" data-target="confirmCard">
              <h3 class="fold-title">待你确认 <span class="count">2</span></h3>
              <span class="chev">▾</span>
            </button>
            <div class="fold-body">
              <p>是否发送给 Alex？</p>
              <p>预算超支提醒已生成</p>
              <p>Agent Link 新消息 2 条</p>
            </div>
          </div>
        </aside>
      </section>

    </main>
  </div>
  <script>
    document.querySelectorAll(".fold-head").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var targetId = btn.getAttribute("data-target");
        var card = targetId ? document.getElementById(targetId) : null;
        if (!card) return;
        card.classList.toggle("collapsed");
      });
    });
    var shell = document.getElementById("appShell");
    var sideToggle = document.getElementById("sideToggle");
    if (shell && sideToggle) {
      sideToggle.addEventListener("click", function () {
        shell.classList.toggle("collapsed");
        var collapsed = shell.classList.contains("collapsed");
        sideToggle.textContent = collapsed ? "▶" : "◀";
        sideToggle.title = collapsed ? "展开侧边栏" : "收起侧边栏";
      });
    }
  </script>
</body>
</html>
